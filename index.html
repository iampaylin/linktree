<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Linktree</title>

    <link rel="stylesheet" href="sup.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab&display=swap" rel="stylesheet">

    <script src="https://kit.fontawesome.com/6f8be84ac9.js" crossorigin="anonymous"></script>

</head>
<body>

    <main>

        <div class="profile">
            <img src="profile/images.jpeg" alt="" width="110px" height="110px">
            <h2 class="name">Paulo Cesar</h2>
        </div>
        <div class="link">
            <a href="https://www.linkedin.com/in/paylin/" target="_blank"><h2 class="botao"><i class="fa-brands fa-linkedin icon"></i>LinkedIn</h2></a>
        </div>
        
        <div class="link">
            <a href="https://github.com/iampaylin" target="_blank"><h2 class="botao"><i class="fa-brands fa-github icon"></i>Github</h2></a>
        </div>
        
        <div class="link">
            <a href="https://open.spotify.com/user/4gvin36hbuyictiwzrvnis9b1?si=X1P8dzI6R4metM60fpd5mw" target="_blank"><h2 class="botao"><i class="fa-brands fa-spotify icon"></i>Spotify</h2></a>
        </div>

        <div class="link">
            <a href="https://www.last.fm/pt/user/Paylin" target="_blank"><h2 class="botao"><i class="fa-brands fa-lastfm icon"></i>Last.fm</h2></a>
        </div>

    </main>

    
    

    <script src="sup.js"></script>
</body>
</html>
